    :root {
      --green: #1a6ab5;
      --navy: #0a1628;
      --gold: #c8a84b;
      --bg: #060e18;
      --panel: #0a1628;
      --border: #1a3a5a;
      --muted: #5a7a9a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; background: var(--bg); min-height: 100vh; color: #fff; }

    /* GATE */
    #gate {
      position: fixed; inset: 0;
      background: linear-gradient(135deg,#050d05,#0a1a0a,#050d05);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    #gate::before {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at 50% 40%, rgba(26,106,181,0.15) 0%, transparent 70%);
      pointer-events:none;
    }
    .gate-box {
      background: rgba(10,22,40,0.97); border:1px solid var(--border);
      border-radius:16px; padding:48px 40px; width:100%; max-width:400px;
      text-align:center; position:relative;
      box-shadow:0 0 60px rgba(26,106,181,0.2),0 20px 60px rgba(0,0,0,0.5);
    }
    .gate-arabic { font-family:'Amiri',serif; font-size:26px; color:var(--gold); margin-bottom:6px; }
    .gate-org { font-size:10px; font-weight:800; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:30px; }
    .gate-title { font-size:12px; font-weight:700; color:#d4e8c4; letter-spacing:2px; text-transform:uppercase; margin-bottom:20px; }
    .gate-input {
      width:100%; padding:13px 16px; border-radius:8px; border:1px solid var(--border);
      background:rgba(0,0,0,0.4); color:#fff; font-size:15px; letter-spacing:3px;
      text-align:center; outline:none; transition:border-color 0.2s; margin-bottom:12px;
      font-family:'Open Sans',sans-serif;
    }
    .gate-input:focus { border-color:#3a8fd4; }
    .gate-btn {
      width:100%; padding:13px; border-radius:8px; border:none;
      background:linear-gradient(135deg,#1a6ab5,#0d3a72); color:#fff;
      font-weight:800; font-size:12px; letter-spacing:2px; text-transform:uppercase;
      cursor:pointer; transition:opacity 0.2s;
    }
    .gate-btn:hover { opacity:0.85; }
    .gate-err { color:#ff6b6b; font-size:11px; margin-top:10px; height:16px; font-weight:600; letter-spacing:1px; }

    /* APP */
    #app { display:none; gap:24px; padding:16px; flex-wrap:wrap; align-items:flex-start; }
    #app.visible { display:flex; }

    /* FORM */
    .form-panel {
      width:300px; flex-shrink:0; max-width:100%; background:var(--panel);
      border:1px solid var(--border); border-radius:14px; padding:22px;
    }
    .form-panel h2 { font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#3a8fd4; margin-bottom:18px; padding-bottom:12px; border-bottom:1px solid var(--border); }
    label { display:block; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; margin-top:12px; }
    input[type="text"], input[type="date"], select {
      width:100%; padding:9px 11px; border-radius:7px; border:1px solid var(--border);
      background:rgba(6,14,24,0.6); color:#fff; font-size:12px;
      font-family:'Open Sans',sans-serif; outline:none; transition:border-color 0.2s;
    }
    input:focus, select:focus { border-color:#3a8fd4; }
    input::placeholder { color:#1a3050; }
    select option { background:#0a1628; }
    .hijri-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
    .hijri-row input[type="checkbox"] { width:auto; accent-color:#3a8fd4; cursor:pointer; }
    .hijri-row label { margin:0; cursor:pointer; font-size:11px; }
    .rel-row { display:flex; gap:6px; margin-top:6px; }
    .rel-row select { flex:1; min-width:0; }
    .rel-row input  { flex:1.5; min-width:0; }
    .rel-row button { flex:0 0 34px; background:#1a6ab5; border:none; border-radius:6px; color:#fff; font-size:18px; cursor:pointer; }
    .rel-row button:hover { background:#3a8fd4; }
    .chips { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
    .chip {
      background:rgba(26,106,181,0.2); border:1px solid rgba(26,106,181,0.4);
      padding:4px 9px; border-radius:20px; font-size:10px; color:#90c8f0;
      display:flex; align-items:center; gap:4px;
    }
    .chip-del  { cursor:pointer; color:#ff8888; margin-left:2px; }
    .chip-edit { cursor:pointer; color:#88bbff; }
    .btn { width:100%; padding:11px; margin-top:8px; border:none; border-radius:8px; cursor:pointer; color:#fff; font-weight:800; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; transition:opacity 0.2s; }
    .btn:hover { opacity:0.85; }
    .btn-gen { background:linear-gradient(135deg,#1a6ab5,#0d3a72); margin-top:20px; }
    .btn-dl  { background:linear-gradient(135deg,#1a4a8a,#0d2a5a); }

    /* PREVIEW */
    .preview-panel { flex:1; display:flex; justify-content:center; align-items:flex-start; min-width:320px; }

    /* NOTICE — overlay on template image */
    #notice {
      position:relative; width:100%; max-width:540px; height:0; padding-bottom:177.78%;
      font-family:'Open Sans',sans-serif;
      border-radius:6px; overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
      line-height:1;
    }
    #notice .bg-img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; display:block; }

    /* All overlay zones positioned absolutely over the image */
    .overlay {
      position:absolute; left:0; right:0;
      display:flex; align-items:center; justify-content:center;
      text-align:center;
    }

    /* DATE — grey strip between navy header and white body */
    #ov-date {
      font-family: "Intelo", sans-serif; font-weight: 600;
      top:37%; height:3%;
      padding:0 28px;
      display:flex; align-items:center; justify-content:space-between;
      font-size:clamp(8px, 2.6vw, 14px); font-weight:700; color:#1a2a10; letter-spacing:0.3px;
    }

/* NAME */
    #ov-name {
      font-family: "Intelo", sans-serif; font-weight: 700;
      top:46%; height:4%;
      font-size:clamp(14px, 5.2vw, 28px);
      color:#1a2a10; letter-spacing:0.5px; text-transform:uppercase;
      line-height:1.1; padding:0 16px;
      display:flex; align-items:center; justify-content:center;
      word-break:break-word; text-align:center;
    }

    /* RELATIONS — italic, below name */
    #ov-rel {
      font-family: "Intelo", sans-serif; font-weight: 300;
      top:50%; height:5%;
      font-size:clamp(7px, 2.2vw, 12px); font-weight:400; font-style:italic;
      color:#2a3a1a; padding:0 20px;
      display:flex; align-items:flex-start; justify-content:center;
      word-break:break-word; line-height:1.5; text-align:center;
    }

    /* ADDRESS — left side, below WILL LEAVE FROM bar */
    #ov-address {
      font-family: "Intelo", sans-serif; font-weight: 600;
      top:53%; height:8%;
      left:5%; right:40%;
      font-size:clamp(8px, 3.0vw, 16px); color:#1a2a10;
      text-align:left; align-items:center; justify-content:flex-start;
      padding:0 12px; line-height:1.55;
      display:flex;
    }

    /* PICK UP TIME — right side */
    #ov-pick {
      font-family: "Intelo", sans-serif; font-weight: 700;
      top:53%; height:8%;
      left:72%; right:0%;
      font-size:clamp(11px, 4.1vw, 22px); color:#1a2a10;
      display:flex; align-items:center; justify-content:center;
      letter-spacing:0.5px;
    }

    /* JANAZAH LOCATION — left side below JANAZAH SALAAH bar */
    #ov-janazah {
      font-family: "Intelo", sans-serif; font-weight: 600;
      top:63%; height:10%;
      left:5%; right:40%;
      font-size:clamp(8px, 3.0vw, 16px); color:#1a2a10;
      text-align:left; align-items:center; justify-content:flex-start;
      padding:0 12px; line-height:1.55;
      display:flex;
    }

    /* JANAZAH TIME — right side */
    #ov-time {
      font-family: "Intelo", sans-serif; font-weight: 700;
      top:63%; height:10%;
      left:72%; right:0%;
      font-size:clamp(11px, 4.1vw, 22px);  color:#1a2a10;
      display:flex; align-items:center; justify-content:center;
      letter-spacing:0.5px;
    }

    /* CEMETERY VALUE — inline in the green CEMETARY bar */
    #ov-cemetery {
      font-family: "Intelo", sans-serif; font-weight: 600;
      top:74%; height:2.5%;
      left:30%; right:2%;
      font-size:clamp(8px, 3.0vw, 16px); color:#000;
      text-align:left; align-items:center; justify-content:flex-start;
      padding:0 10px; letter-spacing:0.5px;
      display:flex;
    }

    /* TIME CHANGE — red text below pickup time */
    #ov-timechange {
      font-family: "Intelo", sans-serif; font-weight: 700;
      top:58.5%; height:3%;
      left:72%; right:0%;
      font-size:clamp(7px, 2.4vw, 13px);
      color:#e60000;
      display:flex; align-items:center; justify-content:center;
      letter-spacing:1px; text-transform:uppercase;
    }
    /* IN CONJUNCTION WITH — red text below janazah location */
    #ov-conjunction {
      font-family: "Intelo", sans-serif; font-weight: 600;
      top:70%; height:5%;
      left:5%; right:40%;
      font-size:clamp(6px, 2.2vw, 12px);
      color:#e60000;
      display:flex; align-items:flex-start; justify-content:flex-start;
      padding:0 12px; line-height:1.4;
      font-style:italic;
    }
    @media (max-width: 700px) {
      body { padding: 12px; }
      #app { padding: 12px; gap: 16px; }
      .form-panel { width: 100%; }
      .preview-panel { width: 100%; min-width: 0; }
    }
  </style>

<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-arabic">إِنَّا لِلَّٰهِ وَإِنَّا إِلَيْهِ رَاجِعُونَ</div>
    <div class="gate-org">Saaberie Chishty Society</div>
    <div class="gate-title">🔒 Authorised Personnel Only</div>
    <input class="gate-input" type="password" id="gate-pw" placeholder="Enter password" autocomplete="off"/>
    <button class="gate-btn" onclick="checkPw()">Enter</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- FORM -->
  <div class="form-panel">
    <h2>✦ SCS Mayyit Notice</h2>

    <label>Date</label>
    <input type="date" id="f-date"/>
    <div class="hijri-row">
      <input type="checkbox" id="f-hijri" checked/>
      <label for="f-hijri">Show Hijri Date</label>
    </div>

    <label>Deceased Name</label>
    <input type="text" id="f-name" placeholder="Deceased full name"/>

    <label>Relations (add one at a time)</label>
    <div class="rel-row">
      <select id="f-rel">
        <option>W/O</option><option>H/O</option>
        <option>S/O</option><option>D/O</option>
        <option>M/O</option><option>F/O</option>
        <option>BRO/O</option><option>SIS/O</option>
        <option>AUNT/O</option><option>UNCLE/O</option>
        <option>GF/O</option><option>GM/O</option>
      </select>
      <input type="text" id="f-rel-name" placeholder="Relative name"/>
      <button onclick="addRel()">+</button>
    </div>
    <div id="chips" class="chips"></div>

    <label>Will Leave From</label>
    <input type="text" id="f-address" placeholder="Street address, Area"/>

    <label>Pick Up Time</label>
    <select id="f-pick"></select>
    <div class="hijri-row" style="margin-top:6px;">
      <input type="checkbox" id="f-timechange" />
      <label for="f-timechange" style="color:#ff4444;margin:0;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;">Show TIME CHANGE</label>
    </div>

    <label>Janazah Salah At</label>
    <input type="text" id="f-janazah" placeholder="Masjid name, Area"/>
    <label style="color:#ff8888;margin-top:8px;">In Conjunction With (optional)</label>
    <input type="text" id="f-conjunction" placeholder="e.g. Haathiem Al Lathaat Burial Services (Cape Town)"/>

    <label>Janazah Time</label>
    <select id="f-time"></select>

    <label>Cemetery</label>
    <input type="text" id="f-proc" placeholder="Masjid name, Area"/>

    <button class="btn btn-gen" onclick="generate()">▶ Generate Notice</button>
    <button class="btn btn-dl" onclick="downloadImg()">⬇ Download Image</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div id="notice">
      <img class="bg-img" id="bg-template" src="" alt=""/>

      <div class="overlay" id="ov-date"><span id="p-date-left"></span><span id="p-date-right"></span></div>
      <div class="overlay" id="ov-name"><span id="p-name"></span></div>
      <div class="overlay" id="ov-rel"><span id="p-rel"></span></div>
      <div class="overlay" id="ov-address"><span id="p-address"></span></div>
      <div class="overlay" id="ov-pick"><span id="p-pick">TBC</span></div>
      <div class="overlay" id="ov-janazah"><span id="p-janazah"></span></div>
      <div class="overlay" id="ov-time"><span id="p-time">TBC</span></div>
      <div class="overlay" id="ov-timechange" style="display:none;"><span>TIME CHANGE</span></div>
      <div class="overlay" id="ov-conjunction" style="display:none;"><span id="p-conjunction"></span></div>
      <div class="overlay" id="ov-cemetery"><span id="p-proc"></span></div>
    </div>
  </div>

</div>

document.getElementById('gate-pw').addEventListener('keydown', e => { if(e.key==='Enter') checkPw(); });

function checkPw() {
  if(document.getElementById('gate-pw').value === PW) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('bg-template').src = 'data:image/jpeg;base64,' + TEMPLATE_B64;
    generate();
  } else {
    const err = document.getElementById('gate-err');
    err.textContent = 'Incorrect password. Please try again.';
    document.getElementById('gate-pw').value = '';
    setTimeout(() => err.textContent = '', 3000);
  }
}

let rels = [];
document.getElementById('f-rel-name').addEventListener('keydown', e => { if(e.key==='Enter') addRel(); });

function addRel() {
  const r = document.getElementById('f-rel').value;
  const n = document.getElementById('f-rel-name').value.trim();
  if(!n) return;
  rels.push(r + ' ' + n);
  document.getElementById('f-rel-name').value = '';
  document.getElementById('f-rel-name').focus();
  renderChips(); generate();
}
function renderChips() {
  const d = document.getElementById('chips'); d.innerHTML = '';
  rels.forEach((r,i) => {
    const el = document.createElement('div'); el.className = 'chip';
    el.innerHTML = r
      + `<span class="chip-edit" onclick="editRel(${i})" title="Edit">✎</span>`
      + `<span class="chip-del" onclick="delRel(${i})" title="Remove">×</span>`;
    d.appendChild(el);
  });
}
function editRel(i) {
  const full = rels[i], sp = full.indexOf(' ');
  const sel = document.getElementById('f-rel');
  for(let o of sel.options) if(o.value===full.substring(0,sp)){sel.value=o.value;break;}
  document.getElementById('f-rel-name').value = full.substring(sp+1);
  delRel(i);
  document.getElementById('f-rel-name').focus();
}
function delRel(i) { rels.splice(i,1); renderChips(); generate(); }

function autoShrink(el, maxH, startSize) {
  let sz = startSize;
  el.style.fontSize = sz + 'px';
  while(el.scrollHeight > maxH && sz > 8) { sz -= 0.5; el.style.fontSize = sz+'px'; }
}

function generate() {
  // Name — auto-shrink if very long
  const nameEl = document.getElementById('p-name');
  nameEl.textContent = (document.getElementById('f-name').value||'').toUpperCase();
  nameEl.style.fontSize = '28px';
  autoShrink(nameEl, 60, 28);

  // Relations — build readable string, auto-shrink
  const relEl = document.getElementById('p-rel');
  relEl.style.fontSize = '13px';
  if(rels.length === 0) {
    relEl.textContent = '';
  } else {
    // Format nicely: "W/O John • S/O Ahmed • D/O Sara"
    relEl.textContent = rels.join('  •  ');
  }
  autoShrink(relEl, 44, 13);

  // Address — newline on comma
  const addr = document.getElementById('f-address').value;
  document.getElementById('p-address').innerHTML = addr
    ? addr.replace(/,\s*/g,'<br>').toUpperCase() : '';

  // Times
  document.getElementById('p-pick').textContent = document.getElementById('f-pick').value || 'TBC';
  document.getElementById('p-time').textContent = document.getElementById('f-time').value || 'TBC';

  // TIME CHANGE
  const tcEl = document.getElementById('ov-timechange');
  tcEl.style.display = document.getElementById('f-timechange').checked ? 'flex' : 'none';

  // IN CONJUNCTION WITH
  const conj = document.getElementById('f-conjunction').value.trim();
  const conjEl = document.getElementById('ov-conjunction');
  document.getElementById('p-conjunction').textContent = conj ? 'In conjunction with ' + conj : '';
  conjEl.style.display = conj ? 'flex' : 'none';

  // Janazah
  const jan = document.getElementById('f-janazah').value;
  document.getElementById('p-janazah').innerHTML = jan
    ? jan.replace(/,\s*/g,'<br>').toUpperCase() : '';

  // Cemetery
  document.getElementById('p-proc').textContent =
    (document.getElementById('f-proc').value||'').toUpperCase();

  // Date
  buildDate();
}

function buildDate() {
  const val = document.getElementById('f-date').value;
  if(!val){ document.getElementById('p-date-left').textContent=''; document.getElementById('p-date-right').textContent=''; return; }
  const [y,m,d] = val.split('-').map(Number);
  const months=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  const greg = `${d} ${months[m-1]} ${y}`;
  document.getElementById('p-date-left').textContent = greg;
  if(document.getElementById('f-hijri').checked) {
    document.getElementById('p-date-right').textContent = getHijriDate(new Date(y,m-1,d));
  } else {
    document.getElementById('p-date-right').textContent = '';
  }
}

function getHijriDate(gDate) {
  const jd = Math.floor(gDate/86400000+2440587.5);
  let l=jd-1948440+10632, n=Math.floor((l-1)/10631);
  l=l-10631*n+354;
  let j=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)+Math.floor(l/5670)*Math.floor((43*l)/15238);
  l=l-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  let hm=Math.floor((24*l)/709), hd=l-Math.floor((709*hm)/24), hy=30*n+j-30;
  const names=['Muharram','Safar','Rabi al-Awwal','Rabi al-Thani','Jumada al-Awwal','Jumada al-Thani','Rajab',"Sha'ban",'Ramadan','Shawwal',"Dhul Qa'dah",'Dhul Hijjah'];
  return `${hd} ${names[hm-1].toUpperCase()} ${hy}`;
}

function populateTimes() {
  ['f-pick','f-time'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">TBC</option>';
    for(let h=0;h<24;h++) for(let m=0;m<60;m+=5) {
      const t=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
      const disp=formatAmPm(h,m);
      el.innerHTML+=`<option value="${disp}">${disp}</option>`;
    }
  });
}
function formatAmPm(h,m) {
  // Return both formats so user can pick
  const ampm=h>=12?'PM':'AM', hh=h%12||12;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function downloadImg() {
  html2canvas(document.getElementById('notice'),{scale:3,useCORS:true,allowTaint:true,logging:false}).then(c=>{
    const a=document.createElement('a'); a.href=c.toDataURL('image/png');
    a.download='scs-mayyit-notice.png'; a.click();
  });
}
